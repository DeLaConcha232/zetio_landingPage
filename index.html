    <!-- Structured Data — SoftwareApplication -->
    <script type="application/ld+json">

      "@context": "https://schema.org",

    <!-- Fonts: preconnect → non-blocking async load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
